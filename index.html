</head>
<body>
    <!-- ===== DESKTOP CONTAINER ===== -->
    <div class="desktop">

                <span>My Computer</span>
            </div>
            <div class="desktop-icon" onclick="openWindow('notepad')">
                <div class="icon-image" style="background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSIzMiIgdmlld0JveD0iMCAwIDMyIDMyIj4KICA8cGF0aCBmaWxsPSIjRkZGRjAwIiBkPSJNMjggNEg0djI0aDI0VjR6bS0yIDIySDZWNmgydjE4aDE4djJ6TTE0IDEwaDEydjJoLTEydi0yem0wIDRoMTJ2MmgtMTJ2LTJ6bTAgNGgxMnYyaC0xMnYtMnoiLz4KPC9zdmc+');"></div>
                <span>Notepad</span>
            </div>
            <div class="desktop-icon" onclick="openWindow('internet-explorer')">
                <div class="icon-image" style="background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSIzMiIgdmlld0JveD0iMCAwIDMyIDMyIj4KICA8cGF0aCBmaWxsPSIjMDA4MEZGIiBkPSJNMTYgMkM4LjI3MyAyIDIgOC4yNzMgMiAxNnM2LjI3MyAxNCAxNCAxNCAxNC02LjI3MyAxNC0xNFMyMy43MjcgMiAxNiAyeiIvPgogIDxwYXRoIGZpbGw9IiNGRkYiIGQ9Ik0xOC45OTIgMTUuOTk0aDMuODA5bC0zLjgwOS0xMC45ODV2Ni45ODRjMCAuNTUyLjQ0OCAxIDEgMWgzLjYxOWwtMy42MTkgMTAuMDA2di02Ljk4NGMwLS41NTItLjQ0OC0xLTEtMWgtMy42MTl6Ii8+Cjwvc3ZnPg==');"></div>
                <span>Internet Explorer</span>
            </div>
        </div>
        <!-- ===== END DESKTOP ICONS ===== -->
        
        <!-- ===== TASKBAR ===== -->
        <div class="taskbar">
            <div class="start-button" id="start-button" onclick="toggleStartMenu()">
                <span>Start</span>
            </div>
            <div class="taskbar-items" id="taskbar-items">
                <!-- Taskbar items will be added here -->
            </div>
            <div class="system-tray">
                <div class="clock" id="clock">10:45 AM</div>
            </div>
        </div>
        <!-- ===== END TASKBAR ===== -->
        
        <!-- ===== START MENU ===== -->
        <div class="start-menu" id="start-menu">
            <div class="start-menu-header">Windows XP</div>
            <div class="start-menu-items">
                <div class="start-menu-item" onclick="openWindow('my-computer')">
                    <span>My Computer</span>
                </div>
                <div class="start-menu-item" onclick="openWindow('notepad')">
                    <span>Notepad</span>
                </div>
                <div class="start-menu-item" onclick="openWindow('internet-explorer')">
                    <span>Internet Explorer</span>
                </div>
            </div>
            <div class="start-menu-footer">
                <div>Log Off</div>
                <div>Turn Off Computer</div>
            </div>
        </div>
        <!-- ===== END START MENU ===== -->

    </div>
    <!-- ===== END DESKTOP CONTAINER ===== -->
    
    <script src="scripts/components.js"></script>
    <script src="scripts/applications/myComputer.js"></script>
    <script src="scripts/applications/notepad.js"></script>
    <script src="scripts/applications/internetExplorer.js"></script>
    <script src="scripts/desktop.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
