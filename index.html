<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tate Donnelly</title>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="styles/base.css">
    
    <!-- Desktop Components -->
    <link rel="stylesheet" href="styles/desktop.css">
    <link rel="stylesheet" href="styles/taskbar.css">
    <link rel="stylesheet" href="styles/window.css">
    
    <!-- UI Components -->
    <link rel="stylesheet" href="styles/components/menu-bar.css">
    <link rel="stylesheet" href="styles/components/toolbar.css">
    <link rel="stylesheet" href="styles/components/status-bar.css">
    <link rel="stylesheet" href="styles/components/content-area.css">
    <link rel="stylesheet" href="styles/components/icon-view.css">
    
    <!-- Application Styles -->
    <link rel="stylesheet" href="styles/applications/internet-explorer.css">
</head>
<body>
    <!-- ===== DESKTOP CONTAINER ===== -->
    <div class="desktop">
        <!-- ===== DESKTOP ICONS ===== -->
        <div class="desktop-icons">
            <div class="desktop-icon ie-icon" onclick="openWindow('internet-explorer', 'projects')">
                <div class="icon-image"></div>
                <span>Internet Explorer</span>
            </div>
            <div class="desktop-icon sincerely-robin" onclick="openWindow('internet-explorer','sincerely-robin')">
                <div class="icon-image"></div>
                <span>Notepad</span>
            </div>
        </div>
        <!-- ===== END DESKTOP ICONS ===== -->
        
        <!-- ===== TASKBAR ===== -->
        <div class="taskbar">
            <div class="start-button" id="start-button" onclick="toggleStartMenu()">
                <span>Start</span>
            </div>
            <div class="taskbar-items" id="taskbar-items">
                <!-- Taskbar items will be added here -->
            </div>
            <div class="system-tray">
                <div class="clock" id="clock">10:45 AM</div>
            </div>
        </div>
        <!-- ===== END TASKBAR ===== -->
        
        <!-- ===== START MENU ===== -->
        <div class="start-menu" id="start-menu">
            <div class="start-menu-header">Windows XP</div>
            <div class="start-menu-items">
                <div class="start-menu-item" onclick="openWindow('internet-explorer')">
                    <span>Internet Explorer</span>
                </div>
            </div>
            <div class="start-menu-footer">
                <div>Log Off</div>
                <div>Turn Off Computer</div>
            </div>
        </div>
        <!-- ===== END START MENU ===== -->

    </div>
    <!-- ===== END DESKTOP CONTAINER ===== -->
    
    <script src="scripts/components.js"></script>
    <script src="scripts/applications/project-pages.js"></script>
    <script src="scripts/applications/internetExplorer.js"></script>
    <script src="scripts/desktop.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
